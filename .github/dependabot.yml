version: 2

updates:
  # JavaScript/TypeScript dependencies — pnpm workspace (Dependabot reads pnpm-lock.yaml).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      # Roll all non-major bumps into one weekly PR to cut noise; majors stay
      # individual so each breaking bump gets its own review.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'

  # GitHub Actions versions (actions/checkout, setup-node, pnpm/action-setup, …).
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci(deps)'
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'github-actions'
