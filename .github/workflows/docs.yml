name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/vite-plugin/**'
      - 'packages/shared/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Must match the GitHub repo name — site lives at https://<user>.github.io/svedtools/
  BASE_PATH: /svedtools

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages (shared, vite-plugin)
        run: pnpm -r --filter '!@svelte-devtools/docs' --filter '!@svelte-devtools/extension' --filter '!playground' build
      - name: Build docs site
        run: pnpm --filter @svelte-devtools/docs build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
