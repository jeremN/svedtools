name: Svelte version compat matrix

# Runs the unit + integration tests against multiple Svelte minors so we
# catch internal-API drift before users do. Skips e2e (slower, redundant
# for compat purposes — the AST transform + bridge wiring is exercised
# by the unit and integration layers).
#
# Scope: only the transform + bridge packages (vite-plugin, shared) are built
# and unit-tested here. These are what run against the *user's* Svelte version.
# The extension UI is shipped as a prebuilt dist compiled with the maintainer's
# own Svelte, so rebuilding it against old minors tests nothing real (and trips
# an esrap printer bug in Svelte < 5.20). Its build + tests run in main.yml/pr.yml.
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with TESTED_SVELTE_RANGE in
        # packages/vite-plugin/src/bridge/compat.ts
        svelte:
          - '5.0.0'
          - '5.10.0'
          - '5.20.0'
          - '5.x'
    env:
      SVELTE_VERSION: ${{ matrix.svelte }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Pin Svelte version via pnpm.overrides
        run: node scripts/pin-svelte-version.mjs

      - name: Install (lockfile may change due to override)
        run: pnpm install --no-frozen-lockfile

      - name: Report Svelte version actually installed
        run: node -e "console.log('svelte version:', require('svelte/package.json').version)"

      - name: Build transform + bridge packages
        run: pnpm --filter vite-plugin-svelte-devtools --filter @svelte-devtools/shared build

      - name: Unit tests (transform + bridge)
        run: pnpm --filter vite-plugin-svelte-devtools --filter @svelte-devtools/shared test

      - name: Integration tests
        run: pnpm run test:integration
